{% include base_path %}

<!-- Favicons -->
<link rel="icon" type="image/png" href="{{ base_path }}/images/profile.jpeg">
<link rel="apple-touch-icon" href="{{ base_path }}/images/profile.jpeg">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#1f6feb">
<meta name="theme-color" content="#ffffff">

<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- MathJax for formulas -->
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    TeX: { equationNumbers: { autoNumber: "all" } },
    tex2jax: { inlineMath: [ ['$','$'], ["\\(","\\)"] ], processEscapes: true }
  });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>
