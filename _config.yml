# Site Settings
locale                   : "en-US"
title                    : "Xiangyu Liu"
title_separator          : "·"
name                     : &name "Xiangyu Liu"
description              : &description "Senior Researcher at WeChat AI, Tencent. Research on LLMs and their applications: on-device personalization, privacy-aware interaction, retrieval-augmented generation, memory agents, and device–cloud collaboration."
url                      : https://shawnlue.github.io
baseurl                  : ""
repository               : "ShawnLue/shawnlue.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
atom_feed:
  path                   :

# SEO
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               : &twitter
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 :
social:
  type                   : Person
  name                   : *name
  links:

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "Xiangyu Liu"
  avatar           : "profile.jpeg"
  bio              : "Senior Researcher @ WeChat AI, Tencent"
  location         : "Beijing, China"
  employer         : "WeChat AI, Tencent"
  googlescholar    : "https://scholar.google.com/citations?user=qPRsI4kAAAAJ&hl=en"
  email            : "liuxiangyu.george@gmail.com"
  github           : "ShawnLue"


# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/


# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai


# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
